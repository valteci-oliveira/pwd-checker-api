version: '3.9'

services:
  pwd-checker-api:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: pwd-checker-api-prod
    ports:
      - "9000:5238"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:5238
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
